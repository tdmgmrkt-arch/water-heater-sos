    - generic:
      - generic:
        - generic:
          - heading [level=2]: Common AC Problems We Fix
          - paragraph: Inland Empire summers regularly push past 100°F — here are the six AC issues our techs see most often.
        - generic:
          - generic:
            - generic:
              - generic:
                - img
              - heading [level=3]: AC Blowing Warm Air
            - paragraph: An AC that runs but pushes out warm or room-temperature air is most often caused by low refrigerant, a dirty evaporator coil, or a failed compressor. We check refrigerant levels, inspect the coil, and test system pressure to pinpoint the cause. Most warm-air calls are resolved same day. If refrigerant is low, we also find and seal the leak — not just recharge the system.
          - generic:
            - generic:
              - generic:
                - img
              - heading [level=3]: Refrigerant Leak
            - paragraph: A refrigerant leak means your system can't absorb heat, so the AC runs nonstop but never cools the house. Signs include ice on the refrigerant line, a hissing sound near the unit, and rising electric bills. Topping off refrigerant without fixing the leak is a short-term patch — we locate the leak, repair it, and restore the correct charge so the fix actually holds. Most Inland Empire systems use R-410A refrigerant; newer installations may use R-454B, the lower-GWP replacement being phased in under the EPA's AIM Act schedule.
          - generic:
            - generic:
              - generic:
                - img
              - heading [level=3]: Frozen Evaporator Coil
            - paragraph:
              - text: A frozen coil shuts down airflow and can damage the compressor if ignored. Causes include restricted airflow (dirty filter, blocked vents), low refrigerant, or a failing blower fan. We thaw the coil safely, identify why it froze, and address the root cause. Running your AC with a frozen coil for more than a few hours often turns a $200 repair into a $1,500 compressor job. Issues with airflow can also be related to
              - link:
                - /url: /air-duct-cleaning
                - text: air duct issues affecting AC performance
              - text: .
          - generic:
            - generic:
              - generic:
                - img
              - heading [level=3]: Capacitor Failure
            - paragraph: The capacitor is the part that starts and runs the compressor and fan motors. When it fails, your AC may hum, click repeatedly, or simply not start. Capacitor failure is one of the most common AC repairs in the Inland Empire — the extreme summer heat degrades capacitors faster than in cooler climates. Replacement is typically a same-day fix and falls on the lower end of the repair cost range.
          - generic:
            - generic:
              - generic:
                - img
              - heading [level=3]: Clogged Condensate Drain Line
            - paragraph: Your AC removes humidity from the air and drains the water out through a condensate line. When that line clogs with algae or debris, water backs up, trips the float switch, and shuts the system off — or worse, leaks into ceilings and walls. We clear the drain line, flush it with a safe cleaning solution, and check the float switch so you don't deal with water damage on top of a broken AC.
          - generic:
            - generic:
              - generic:
                - img
              - heading [level=3]: Failed Compressor
            - paragraph: The compressor is the heart of your AC system — it pressurizes the refrigerant and drives the entire cooling cycle. A failed compressor usually means the unit is making a grinding or clanking noise and the home isn't cooling at all. Compressor replacement is the most expensive AC repair, typically $800–$1,800 for the part and labor. If your system is 10+ years old, we'll give you an honest comparison between repair and replacement so you can make the right call for your budget.
    - generic:
      - generic:
        - generic:
          - heading [level=2]: What to Expect When You Call Our HVAC Team
        - generic:
          - generic:
            - generic: "01"
            - generic:
              - img
            - heading [level=3]: Call or Book Online
            - paragraph: Call (800) 697-4014 or submit a quote request. Tell us what the system is doing (or not doing) and we'll give you an arrival window. Same-day appointments are available seven days a week across the Inland Empire.
          - generic:
            - generic: "02"
            - generic:
              - img
            - heading [level=3]: Diagnosis
            - paragraph: Your technician arrives, inspects the system, and runs a full diagnostic. We check refrigerant levels, electrical components, airflow, coil condition, and drainage. You'll know exactly what's wrong before we quote any work.
          - generic:
            - generic: "03"
            - generic:
              - img
            - heading [level=3]: Upfront Price, No Surprises
            - paragraph: We quote the repair before starting. The price you approve is the price on your invoice. No "additional charges discovered mid-job."
          - generic:
            - generic: "04"
            - generic:
              - img
            - heading [level=3]: Repair + Warranty
            - paragraph: We complete the repair, test the system through a full cooling cycle, and walk you through what was done. All repairs carry a workmanship warranty — if the same issue returns, we return to fix it at no charge.
    - generic:
      - generic:
        - generic:
          - heading [level=2]: How Much Does AC Repair Cost?
          - paragraph:
            - strong: AC repair in the Inland Empire costs between $150 and $1,800, with most service calls falling in the $150–$800 range. A diagnostic call starts at $75–$150 (typically applied toward the repair), while a full compressor replacement is the highest-cost repair at $800–$1,800.
          - paragraph: "Here’s how that repair range breaks down by service type:"
          - list:
            - listitem:
              - generic: Diagnostic fee
              - generic: $75–$150 (applied toward the repair if you proceed)
            - listitem:
              - generic: Capacitor replacement
              - generic: $150–$350
            - listitem:
              - generic: Refrigerant recharge (plus leak repair)
              - generic: $200–$600
            - listitem:
              - generic: Condensate drain cleaning
              - generic: $100–$250
            - listitem:
              - generic: Evaporator coil cleaning
              - generic: $150–$400
            - listitem:
              - generic: Fan motor replacement
              - generic: $300–$700
            - listitem:
              - generic: Compressor replacement
              - generic: $800–$1,800
          - paragraph: Cost varies by system age, refrigerant type, and accessibility. We give you an exact number before any work begins.
          - heading [level=3]: Repair vs. Replace
          - paragraph:
            - strong: Replace your AC when the repair cost exceeds 50% of a new system’s price AND your unit is 10 or more years old; otherwise, repair is typically the better investment. According to ENERGY STAR, the average central AC has a useful lifespan of 10–15 years, which is why the age threshold matters as much as the cost threshold.
          - paragraph: When a repair quote feels high, the question becomes whether it’s smarter to replace the system. A 15-year-old unit using R-22 refrigerant (now phased out and expensive) is almost always a replacement candidate. Replacement also unlocks a meaningful efficiency upgrade — current minimum-efficiency residential systems in California must meet SEER2 14.3 (raised from the prior SEER 14 standard in 2023), and high-efficiency units run SEER2 18 or higher, which can cut summer cooling costs noticeably given the Inland Empire’s long cooling season.
          - paragraph: We’ll tell you honestly where your system stands. If replacement makes more sense, we’ll walk you through AC installation options and can schedule that same week. If the repair is solid, we’ll do the repair.
